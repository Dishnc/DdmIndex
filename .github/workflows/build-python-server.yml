name: Build and Publish Web

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          zip -r release/p_ddm_portal_web-V1.0.0-source.zip . -x ".git/*" "release/*"

      - name: Detect artifact file
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_FILE="$(find release -maxdepth 1 -type f | sort | head -n 1)"
          if [ -z "$ARTIFACT_FILE" ]; then
            echo "release 目录下没有找到可回传的产物文件" >&2
            exit 1
          fi
          ARTIFACT_NAME="$(basename "$ARTIFACT_FILE")"
          ARTIFACT_SIZE="$(wc -c < "$ARTIFACT_FILE" | tr -d ' ')"
          ARTIFACT_SHA256="$(sha256sum "$ARTIFACT_FILE" | cut -d ' ' -f 1)"
          echo "file=$ARTIFACT_FILE" >> "$GITHUB_OUTPUT"
          echo "name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$ARTIFACT_SIZE" >> "$GITHUB_OUTPUT"
          echo "sha256=$ARTIFACT_SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: p_ddm_portal_web-V1.0.0
          path: ${{ steps.artifact.outputs.file }}

      - name: Upload release package to x-ui Project Center
        if: success()
        env:
          XUI_CI_UPLOAD_URL: ${{ secrets.XUI_CI_UPLOAD_URL }}
          XUI_CI_UPLOAD_TOKEN: ${{ secrets.XUI_CI_UPLOAD_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$XUI_CI_UPLOAD_URL" ] || [ -z "$XUI_CI_UPLOAD_TOKEN" ]; then
            echo "缺少 GitHub Secrets：XUI_CI_UPLOAD_URL 或 XUI_CI_UPLOAD_TOKEN" >&2
            exit 1
          fi
          RESPONSE_FILE="/tmp/xui-ci-upload-response.json"
          HTTP_CODE="$(curl --show-error --location --silent --output "$RESPONSE_FILE" --write-out "%{http_code}"             -H "X-CI-Token: $XUI_CI_UPLOAD_TOKEN"             -H "Authorization: Bearer $XUI_CI_UPLOAD_TOKEN"             -F "ci_token=$XUI_CI_UPLOAD_TOKEN"             -F "project_key=p_ddm_portal_web"             -F "version_name=V1.0.0"             -F "version_code=${{ github.run_number }}"             -F "git_sha=${{ github.sha }}"             -F "github_run_id=${{ github.run_id }}"             -F "workflow_name=${{ github.workflow }}"             -F "status=success"             -F "artifact_name=${{ steps.artifact.outputs.name }}"             -F "artifact_type=source.zip"             -F "artifact_size=${{ steps.artifact.outputs.size }}"             -F "artifact_sha256=${{ steps.artifact.outputs.sha256 }}"             -F "release_notes=GitHub Actions 自动打包成功并回传 x-ui 项目中心"             -F "artifact=@${{ steps.artifact.outputs.file }}"             "$XUI_CI_UPLOAD_URL")"
          echo "x-ui CI upload HTTP status: $HTTP_CODE"
          cat "$RESPONSE_FILE" || true
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "x-ui CI upload failed. Please check XUI_CI_UPLOAD_URL / XUI_CI_UPLOAD_TOKEN in GitHub repository secrets." >&2
            exit 22
          fi
